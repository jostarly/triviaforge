<!DOCTYPE html>
<html>
<head>

    <title>Trivia Forge</title>
    <link rel="stylesheet" href="style.css">
</head>

<h1 id="game-title" style="margin-bottom: 0;">Trivia Forge</h1>

<script src="presets.js"></script>
<script src="script.js"></script>

</html>

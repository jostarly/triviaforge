<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Question</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="question-container">
    <p id="question-text"></p>

    <img id="question-image"
         style="max-width: 80%;
                max-height: 400px;
                display: none;
                margin: 12px auto;
                object-fit: contain;">

    <audio id="question-audio"
           controls
           style="display: none;
                  margin: 12px auto;"></audio>

    <button id="show-answer">Show Answer</button>
    <p id="answer-text" class="hidden"></p>
    <div id="participant-scores"></div>
    <button id="back">Back to Board</button>
</div>

<script>
const sounds = {
    chime: new Audio("sounds/chime.mp3")
};

function playSound(name) {
    if (localStorage.getItem("soundEnabled") !== "true") return;

    const s = sounds[name];
    if (!s) return;
    s.currentTime = 0;
    s.play().catch(() => {});
}

// LOAD QUESTION
let gameData = JSON.parse(sessionStorage.getItem("gameData") || "null");
const q = JSON.parse(sessionStorage.getItem("currentQuestion") || "null");
const key = sessionStorage.getItem("currentKey");

if (q) {
    document.getElementById("question-text").textContent = q.question || "";
    document.getElementById("answer-text").textContent = q.answer || "";

    if (q.image) {
        const img = document.getElementById("question-image");
        img.src = q.image;
        img.style.display = "block";
    }

    if (q.audio) {
        const aud = document.getElementById("question-audio");
        aud.src = q.audio;
        aud.style.display = "block";
    }
}

// MARK USED
if (key) {
    localStorage.setItem(key, "used");
}

// SHOW ANSWER
document.getElementById("show-answer").onclick = () => {
    playSound("chime");
    document.getElementById("answer-text").classList.remove("hidden");

    showParticipantScores();
};

// SHOW PARTICIPANTS (with individual give buttons)
function showParticipantScores() {
    const container = document.getElementById("participant-scores");
    container.innerHTML = "";

    if (!gameData || !Array.isArray(gameData.participants) || gameData.participants.length === 0) {
        return;
    }

    gameData.participants.forEach((p, index) => {
        const box = document.createElement("div");
        box.classList.add("score-box");

        const name = document.createElement("div");
        name.classList.add("name");
        name.textContent = p.name;

        const divider = document.createElement("div");
        divider.classList.add("divider");

        const score = document.createElement("div");
        score.classList.add("score");
        score.textContent = p.score;

        const give = document.createElement("button");
        give.textContent = "Give Points";
        give.style.marginTop = "6px";

        give.onclick = () => {
            givePoints(index);
        };

        box.appendChild(name);
        box.appendChild(divider);
        box.appendChild(score);
        box.appendChild(give);

        container.appendChild(box);
    });
}

// GIVE POINTS TO SPECIFIC PLAYER
function givePoints(index) {
    if (!gameData || !Array.isArray(gameData.participants)) return;
    if (!q) return;
    if (!gameData.participants[index]) return;

    gameData.participants[index].score += q.value || 0;

    sessionStorage.setItem("gameData", JSON.stringify(gameData));

    showParticipantScores();
}

// BACK
document.getElementById("back").onclick = () => {
    sessionStorage.removeItem("currentQuestion");
    sessionStorage.removeItem("currentKey");

    window.location.href = "index.html";
};
</script>



</body>
</html>

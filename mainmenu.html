<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trivia Forge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu-container">
    <h1>Trivia Forge</h1>

    <button onclick="location.href='index.html?new=true'">
        Play Game
    </button>

    <button onclick="location.href='admin.html'">Question Editor</button>

    <div id="sound-setting">
        <label>
            Enable Sound Effects
            <input type="checkbox" id="sound-toggle">
        </label>
    </div>
</div>

<script>
if (localStorage.getItem("soundEnabled") === null) {
    localStorage.setItem("soundEnabled", "false");
}

const toggle = document.getElementById("sound-toggle");
toggle.checked = localStorage.getItem("soundEnabled") === "true";

toggle.addEventListener("change", () => {
    localStorage.setItem("soundEnabled", toggle.checked ? "true" : "false");
});
</script>

</body>
</html>
